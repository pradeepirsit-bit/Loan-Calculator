<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Loan Amortization — Dashboard with Charts</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{
      --bg:#f6f8fb; --card:#ffffff; --muted:#6b7280; --accent:#0f172a; --accent-2:#2563eb;
      --glass: rgba(15,23,42,0.04); --success:#059669; --danger:#ef4444;
    }
    html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;background:var(--bg);color:var(--accent)}
    .wrap{max-width:1100px;margin:28px auto;display:grid;grid-template-columns:360px 1fr;gap:20px;align-items:start}
    .card{background:var(--card);border-radius:12px;padding:18px;box-shadow:0 6px 18px rgba(16,24,40,0.06);border:1px solid rgba(15,23,42,0.04)}
    h1{font-size:16px;margin:0 0 8px 0;font-weight:700;color:var(--accent)}
    .muted{color:var(--muted);font-size:13px}
    label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
    input[type="number"], input[type="date"]{
      width:100%;padding:10px;border-radius:8px;border:1px solid rgba(15,23,42,0.06);background:transparent;color:var(--accent);font-size:14px;box-sizing:border-box;
    }
    .row{display:flex;gap:10px}
    .btn{background:linear-gradient(90deg,var(--accent),var(--accent-2));border:none;color:white;padding:10px 12px;border-radius:8px;cursor:pointer;font-weight:600}
    .btn.ghost{background:transparent;border:1px solid rgba(15,23,42,0.06);color:var(--accent)}
    .btn.small{padding:8px 10px;font-size:13px}
    .freq-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
    .freq-block{padding:10px;border-radius:8px;border:1px solid rgba(15,23,42,0.04);background:var(--glass)}
    .controls{display:flex;gap:10px;align-items:center;margin-top:12px}
    .logo{display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .mark{width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;color:white;font-weight:700}
    .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}
    .summary-item{padding:12px;border-radius:8px;background:linear-gradient(180deg,#fff,#fbfdff);border:1px solid rgba(15,23,42,0.03);text-align:center}
    .summary-label{font-size:12px;color:var(--muted)}
    .summary-value{font-weight:700;margin-top:6px}
    .popup { position: absolute; left: 18px; top: 420px; width:360px; background:var(--card); border-radius:10px; padding:12px; box-shadow:0 10px 30px rgba(16,24,40,0.08); border:1px solid rgba(15,23,42,0.04); display:none; z-index:40 }
    .popup.visible { display:block; }
    .prepay-list{max-height:160px;overflow:auto;margin-top:8px;border-radius:8px;padding:8px;background:transparent;border:1px dashed rgba(15,23,42,0.04)}
    .prepay-item{display:flex;justify-content:space-between;align-items:center;padding:8px;border-radius:6px;background:rgba(15,23,42,0.02);margin-bottom:6px}
    .prepay-item .meta{color:var(--muted);font-size:13px}
    .del{background:transparent;border:none;color:var(--danger);cursor:pointer;font-weight:700}
    canvas{max-height:300px !important}
    @media (max-width:980px){.wrap{grid-template-columns:1fr}.popup{position:static;width:100%}}
  </style>
</head>
<body>
  <div class="wrap">
    <!-- Left: Inputs -->
    <div class="card" id="leftCard" style="position:relative">
      <div class="logo">
        <div class="mark">LA</div>
        <div>
          <div style="font-weight:700">Loan Amortization</div>
          <div class="muted" style="margin-top:4px">Minimal • Professional • Focused</div>
        </div>
      </div>

      <div style="margin-top:8px">
        <label>Loan amount (Principal) ₹</label>
        <input id="principal" type="number" min="0" step="1000" value="500000" />
      </div>

      <div class="row" style="margin-top:10px">
        <div style="flex:1">
          <label>Annual Interest Rate (APR %)</label>
          <input id="apr" type="number" min="0" step="0.01" value="8.5" />
        </div>
        <div style="width:120px">
          <label>Term (years)</label>
          <input id="years" type="number" min="1" step="1" value="20" />
        </div>
      </div>

      <div style="margin-top:10px">
        <label>EMI Payment Start Date</label>
        <input id="startDate" type="date" />
      </div>

      <div style="margin-top:10px">
        <label>Prepayment Start Date</label>
        <input id="prepayStartDate" type="date" />
      </div>

      <div style="margin-top:12px" class="freq-grid">
        <div class="freq-block">
          <label class="muted">Monthly Prepayment (₹)</label>
          <input id="pMonthly" type="number" min="0" step="1" value="2000" />
        </div>
        <div class="freq-block">
          <label class="muted">Quarterly Prepayment (₹)</label>
          <input id="pQuarterly" type="number" min="0" step="1" value="0" />
        </div>
        <div class="freq-block">
          <label class="muted">Half‑Yearly Prepayment (₹)</label>
          <input id="pHalfYearly" type="number" min="0" step="1" value="0" />
        </div>
        <div class="freq-block">
          <label class="muted">Yearly Prepayment (₹)</label>
          <input id="pYearly" type="number" min="0" step="1" value="0" />
        </div>
      </div>

      <div class="controls" style="margin-top:14px">
        <button id="calc" class="btn small">Calculate</button>
        <button id="oneOffBtn" class="btn small" style="background:#111827">One‑off Prepayments</button>
        <button id="reset" class="btn ghost small">Reset</button>
      </div>

      <!-- One-off popup -->
      <div id="oneOffPopup" class="popup" aria-hidden="true">
        <h3 style="margin:0 0 8px 0;font-size:14px;color:var(--accent)">One‑off Prepayments</h3>
        <div class="muted" style="font-size:13px">Add specific one-off prepayments (applied on the chosen EMI month).</div>
        <div class="row" style="margin-top:10px">
          <div style="flex:1">
            <label>Amount (₹)</label>
            <input id="popupAmount" type="number" min="0" step="1" value="5000" />
          </div>

            <label>Date</label>
            <input id
